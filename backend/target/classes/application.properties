# Server
server.port=${SERVER_PORT:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/azar_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# WebSocket
spring.websocket.max-session-idle-timeout=300000

# CORS - comma-separated allowed origins
app.cors.allowed-origins=https://10.203.148.87:3000,http://10.203.148.87:3000
# IP Geolocation API (free tier)
app.geo.api-url=http://ip-api.com/json/

# Logging
logging.level.com.azarclone=DEBUG
logging.level.org.springframework.web.socket=INFO




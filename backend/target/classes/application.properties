# Server
server.port=${SERVER_PORT:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/azar_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=root
spring.datasource.password=123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# WebSocket
spring.websocket.max-session-idle-timeout=300000

# CORS - comma-separated allowed origins
app.cors.allowed-origins=http://localhost:3000,https://localhost:3000,https://10.251.104.87:3000,https://192.168.1.8:3000
# IP Geolocation API (free tier)
app.geo.api-url=http://ip-api.com/json/

# JWT Configuration
app.jwt.secret=${JWT_SECRET:HoursAppSecretKey2024!AzarCloneSecureJWTSigningKeyMustBeLong}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Google Identity Services
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Multipart (for moderation frame uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB



# Logging
logging.level.com.azarclone=DEBUG
logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=OFF




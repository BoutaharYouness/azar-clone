name: azar_mobile
description: Random video chat mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC
  flutter_webrtc: ^0.10.0

  # WebSocket / STOMP
  stomp_dart_client: ^1.0.0

  # HTTP
  http: ^1.2.0

  # Local storage (device ID persistence)
  shared_preferences: ^2.2.0

  # UUID generation
  uuid: ^4.3.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
